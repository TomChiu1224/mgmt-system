<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快速建立任務</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root {
    --bg: #f5f3ee;
    --card: #ffffff;
    --primary: #2d5be3;
    --primary-dark: #1a3db5;
    --ai-color: #7c3aed;
    --ai-dark: #5b21b6;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #d97706;
    --text: #1a1a2e;
    --text-light: #6b7280;
    --border: #e5e0d8;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #2d5be3 100%);
    color: white;
    padding: 24px 20px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(45,91,227,0.3);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 4px;
  }

  /* Mode Toggle */
  .mode-toggle {
    display: flex;
    margin: 20px 16px 0;
    background: white;
    border-radius: 16px;
    padding: 6px;
    box-shadow: var(--shadow);
    gap: 6px;
  }
  .mode-btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: transparent;
    color: var(--text-light);
  }
  .mode-btn.active-manual {
    background: linear-gradient(135deg, #2d5be3, #1a3db5);
    color: white;
    box-shadow: 0 4px 16px rgba(45,91,227,0.4);
  }
  .mode-btn.active-ai {
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
    box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  }
  .mode-icon { font-size: 20px; }

  /* Content */
  .content { padding: 16px; }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Section Card */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Form Fields */
  label {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .required { color: var(--danger); }

  input[type="text"],
  input[type="date"],
  textarea,
  select {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    color: var(--text);
    background: #fafaf8;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    background: white;
  }
  textarea { resize: vertical; min-height: 90px; }
  .field-group { margin-bottom: 16px; }

  /* Department Grid */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .dept-btn {
    padding: 14px 6px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: #fafaf8;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .dept-btn span.di { font-size: 22px; }
  .dept-btn:active { transform: scale(0.96); }
  .dept-btn.selected {
    border-color: var(--primary);
    background: #eff4ff;
    color: var(--primary);
  }

  /* Attach Upload Area */
  .attach-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafaf8;
    position: relative;
  }
  .attach-area:active { background: #eff4ff; border-color: var(--primary); }
  .attach-area .photo-icon { font-size: 36px; margin-bottom: 6px; }
  .attach-area p { font-size: 13px; color: var(--text-light); }
  .attach-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .thumb-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .attach-thumb {
    width: 56px; height: 56px;
    border-radius: 8px; overflow: hidden;
    position: relative; background: #eee; flex-shrink: 0;
  }
  .attach-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .attach-thumb .del-btn {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.65); color: white; border: none;
    border-radius: 50%; font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .file-item {
    display: flex; align-items: center; gap: 8px;
    background: #f5f3ee; border: 1px solid #e5e0d8;
    border-radius: 8px; padding: 8px 12px;
  }
  .file-item .fi-icon { font-size: 20px; }
  .file-item .fi-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fi-size { font-size: 11px; color: var(--text-light); white-space: nowrap; }
  .file-item .fi-del { background: #fdedec; border: 1px solid #f5c6cb; color: #dc2626; border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; }
  /* 拖曳高亮 */
  .attach-area.drag-over {
    background: #eff4ff;
    border-color: var(--primary);
    border-style: solid;
    transform: scale(1.01);
    box-shadow: 0 0 0 4px rgba(45,91,227,0.15);
  }
  .attach-area.drag-over .photo-icon { transform: scale(1.2); }
  .attach-area.drag-over p { color: var(--primary); font-weight: 700; }

  /* Submit Button */
  .submit-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.manual-btn {
    background: linear-gradient(135deg, #2d5be3, #1a3db5);
    color: white;
    box-shadow: 0 6px 20px rgba(45,91,227,0.4);
  }
  .submit-btn.ai-btn {
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
    box-shadow: 0 6px 20px rgba(124,58,237,0.4);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* AI Panel Specific */
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .ai-input-area {
    border: 2px solid #e8d8ff;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    background: #faf5ff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    color: var(--text);
    width: 100%;
    min-height: 100px;
    resize: vertical;
  }
  .ai-input-area:focus {
    outline: none;
    border-color: var(--ai-color);
    background: white;
  }

  .analyze-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 17px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 16px rgba(124,58,237,0.35);
  }
  .analyze-btn:active { transform: scale(0.98); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* AI Result */
  .ai-result {
    display: none;
    animation: slideUp 0.4s ease;
  }
  .ai-result.show { display: block; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ai-result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .ai-result-header .check {
    width: 36px; height: 36px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .ai-result-header h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--success);
  }

  .result-field {
    margin-bottom: 14px;
  }
  .result-field label {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 6px;
  }
  .result-field input,
  .result-field textarea,
  .result-field select {
    border-color: #c4b5fd;
    background: #faf5ff;
  }
  .result-field input:focus,
  .result-field textarea:focus,
  .result-field select:focus {
    border-color: var(--ai-color);
  }

  /* Loading */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .loading-spinner {
    width: 56px; height: 56px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: white; font-size: 16px; font-weight: 700; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a2e;
    color: white;
    padding: 14px 24px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #16a34a; }
  .toast.error { background: #dc2626; }

  /* API Setting */
  .api-setting-bar {
    background: #fff8e1;
    border: 1px solid #fcd34d;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .api-setting-bar span { font-size: 13px; color: #92400e; flex: 1; }
  .api-setting-bar button {
    background: #d97706;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  /* API Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h3 { font-size: 18px; font-weight: 900; margin-bottom: 16px; }
  .modal input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .modal-btns .cancel-btn { background: #f3f4f6; color: var(--text); }
  .modal-btns .save-btn { background: var(--primary); color: white; }

  /* Hint text */
  .hint { font-size: 13px; color: var(--text-light); margin-top: 6px; }

  /* Examples */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .example-chip {
    background: #f0ebff;
    color: var(--ai-color);
    border: 1px solid #d8b4fe;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-chip:active { background: #ddd6fe; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📋 快速建立任務</h1>
  <p>管理部任務系統</p>
</div>

<!-- Mode Toggle -->
<div class="mode-toggle">
  <button class="mode-btn active-manual" id="btn-manual" onclick="switchMode('manual')">
    <span class="mode-icon">✏️</span> 手動輸入
  </button>
  <button class="mode-btn" id="btn-ai" onclick="switchMode('ai')">
    <span class="mode-icon">🤖</span> AI 智能建立
  </button>
</div>

<!-- Content -->
<div class="content">

  <!-- ===== MANUAL PANEL ===== -->
  <div class="panel active" id="panel-manual">

    <!-- 部門 -->
    <div class="card">
      <div class="card-title">📂 選擇部門 <span class="required">*</span></div>
      <div class="dept-grid">
        <button class="dept-btn" onclick="selectDept(this,'管理')"><span class="di">🏢</span>管理</button>
        <button class="dept-btn" onclick="selectDept(this,'文書')"><span class="di">📄</span>文書</button>
        <button class="dept-btn" onclick="selectDept(this,'會計')"><span class="di">💰</span>會計</button>
        <button class="dept-btn" onclick="selectDept(this,'總務')"><span class="di">🔧</span>總務</button>
        <button class="dept-btn" onclick="selectDept(this,'採購')"><span class="di">🛒</span>採購</button>
        <button class="dept-btn" onclick="selectDept(this,'資訊')"><span class="di">💻</span>資訊</button>
        <button class="dept-btn" onclick="selectDept(this,'保全')"><span class="di">🔒</span>保全</button>
        <button class="dept-btn" onclick="selectDept(this,'水電')"><span class="di">💧</span>水電</button>
        <button class="dept-btn" onclick="selectDept(this,'木工')"><span class="di">🪚</span>木工</button>
        <button class="dept-btn" onclick="selectDept(this,'園藝')"><span class="di">🌿</span>園藝</button>
        <button class="dept-btn" onclick="selectDept(this,'暫放')"><span class="di">📦</span>暫放</button>
        <button class="dept-btn" onclick="selectDept(this,'污水')"><span class="di">🚰</span>污水</button>
      </div>
      <input type="hidden" id="manual-dept">
    </div>

    <!-- 任務名稱 -->
    <div class="card">
      <div class="card-title">📝 任務名稱 <span class="required">*</span></div>
      <input type="text" id="manual-name" placeholder="例：廁所水龍頭維修" maxlength="100">
    </div>

    <!-- 說明 -->
    <div class="card">
      <div class="card-title">📋 說明（選填）</div>
      <textarea id="manual-desc" placeholder="詳細描述任務內容..."></textarea>
    </div>

    <!-- 截止日期 & 負責人 -->
    <div class="card">
      <div class="field-group">
        <label>📅 截止日期（選填）</label>
        <input type="date" id="manual-date">
      </div>
      <div class="field-group" style="margin-bottom:0">
        <label>👤 負責人（選填）</label>
        <input type="text" id="manual-assignee" placeholder="輸入姓名">
      </div>
    </div>

    <!-- 附件上傳（圖片＋檔案合一） -->
    <div class="card">
      <div class="card-title">📎 附件（選填）</div>
      <div class="attach-area">
        <div class="photo-icon">📎</div>
        <p>點此上傳照片或檔案（圖片、PDF、Word、Excel 均可）</p>
        <input type="file" multiple
               accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"
               onchange="handleAttachments(this,'manual')">
      </div>
      <div class="thumb-row" id="manual-thumb-row"></div>
      <div class="file-list" id="manual-file-list"></div>
    </div>

    <!-- 送出 -->
    <button class="submit-btn manual-btn" onclick="submitManual()">
      ✅ 建立任務
    </button>

  </div><!-- end manual panel -->


  <!-- ===== AI PANEL ===== -->
  <div class="panel" id="panel-ai">

    <!-- API Key 設定 -->
    <div class="api-setting-bar" onclick="showApiModal()">
      <span>🔑 <span id="api-status">尚未設定 Claude API Key</span></span>
      <button>設定</button>
    </div>

    <!-- 輸入區 -->
    <div class="card">
      <div class="ai-badge">🤖 AI 智能分析</div>
      <div class="card-title">說說你需要什麼</div>
      <textarea class="ai-input-area" id="ai-text"
        placeholder="用說的方式描述就好，例如：&#10;「B棟廁所的水龍頭壞了，水一直滴，要趕快修，最好三天內可以處理」&#10;&#10;AI 會自動幫你填好所有欄位！"></textarea>
      <div class="examples">
        <div class="example-chip" onclick="fillExample('廚房冷氣不冷，需要請人來保養檢查')">冷氣保養</div>
        <div class="example-chip" onclick="fillExample('採購影印紙，A4，需要20箱，下週前要到')">採購用品</div>
        <div class="example-chip" onclick="fillExample('一樓走廊燈管壞了需要更換')">燈管更換</div>
        <div class="example-chip" onclick="fillExample('月底前要整理文件歸檔')">文件歸檔</div>
      </div>
    </div>

    <!-- 附件上傳（圖片＋檔案合一，AI 會一起分析圖片） -->
    <div class="card">
      <div class="card-title">📎 附件（選填，AI 會分析圖片）</div>
      <div class="attach-area">
        <div class="photo-icon">📎</div>
        <p>點此上傳照片或檔案（圖片、PDF、Word、Excel 均可）</p>
        <input type="file" multiple
               accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"
               onchange="handleAttachments(this,'ai')">
      </div>
      <div class="thumb-row" id="ai-thumb-row"></div>
      <div class="file-list" id="ai-file-list"></div>
    </div>

    <!-- 分析按鈕 -->
    <button class="analyze-btn" id="analyze-btn" onclick="analyzeWithAI()">
      🤖 AI 自動分析填入
    </button>

    <!-- AI 結果 -->
    <div class="ai-result" id="ai-result">
      <div class="card" style="border: 2px solid #c4b5fd; margin-top: 14px;">
        <div class="ai-result-header">
          <div class="check">✅</div>
          <div>
            <h3>AI 分析完成！請確認並修改</h3>
            <p style="font-size:13px;color:#6b7280;">可以直接編輯下方內容</p>
          </div>
        </div>

        <div class="result-field">
          <label>📂 部門</label>
          <select id="ai-dept">
            <option value="">請選擇</option>
            <option>管理</option><option>文書</option><option>會計</option>
            <option>總務</option><option>採購</option><option>資訊</option>
            <option>保全</option><option>水電</option><option>木工</option><option>園藝</option>
          </select>
        </div>
        <div class="result-field">
          <label>📝 任務名稱</label>
          <input type="text" id="ai-name">
        </div>
        <div class="result-field">
          <label>📋 說明</label>
          <textarea id="ai-desc" style="min-height:80px;"></textarea>
        </div>
        <div class="result-field">
          <label>📅 截止日期</label>
          <input type="date" id="ai-date">
        </div>
        <div class="result-field" style="margin-bottom:0">
          <label>👤 負責人</label>
          <input type="text" id="ai-assignee" placeholder="（可選填）">
        </div>
      </div>

      <button class="submit-btn ai-btn" onclick="submitAI()" style="margin-top:14px;">
        ✅ 確認建立任務
      </button>
    </div>

  </div><!-- end ai panel -->

</div><!-- end content -->


<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">處理中...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- API Modal -->
<div class="modal-bg" id="api-modal">
  <div class="modal">
    <h3>🔑 設定 Claude API Key</h3>
    <input type="text" id="api-key-input" placeholder="sk-ant-api03-...">
    <p class="hint" style="margin-bottom:14px;">設定後會記住，不需要每次輸入</p>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="hideApiModal()">取消</button>
      <button class="save-btn" onclick="saveApiKey()">儲存</button>
    </div>
  </div>
</div>


<script>
// ===== CONFIG =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwtUycyJg6A4LPWn0VIgJmE8z8hL2jXxRSB6022-4UFf9QLZTdfLRzXVsVLwyW0Fk9ubA/exec';

async function gasPost(d) {
  const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(d) });
  return r.json();
}

// ===== STATE =====
let selectedDept = '';
let manualPhotos = [];
let aiPhotos = [];
let aiPhotoBase64 = [];
let manualFiles = [];
let aiFiles = [];

// ===== INIT =====
window.onload = () => {
  const key = localStorage.getItem('claude_api_key');
  if (key) {
    document.getElementById('api-status').textContent = 'API Key 已設定 ✓';
  }
};

// ===== MODE SWITCH =====
function switchMode(mode) {
  document.getElementById('panel-manual').classList.toggle('active', mode === 'manual');
  document.getElementById('panel-ai').classList.toggle('active', mode === 'ai');
  document.getElementById('btn-manual').className = 'mode-btn' + (mode === 'manual' ? ' active-manual' : '');
  document.getElementById('btn-ai').className = 'mode-btn' + (mode === 'ai' ? ' active-ai' : '');
}

// ===== DEPT SELECT =====
function selectDept(btn, dept) {
  document.querySelectorAll('#panel-manual .dept-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedDept = dept;
  document.getElementById('manual-dept').value = dept;
}

// ===== PHOTO HANDLING =====
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const maxSize = 800;
        if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
        else if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function handlePhotos(input, mode) {
  const files = Array.from(input.files);
  const preview = document.getElementById(mode + '-photo-preview');
  files.forEach(async (file) => {
    const base64 = await compressImage(file);
    if (mode === 'manual') manualPhotos.push({ file, base64 });
    else { aiPhotos.push({ file, base64 }); aiPhotoBase64.push(base64.split(',')[1]); }
    const idx = mode === 'manual' ? manualPhotos.length-1 : aiPhotos.length-1;
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${base64}"><button class="del-btn" onclick="removePhoto(this,'${mode}',${idx})">✕</button>`;
    preview.appendChild(div);
  });
  input.value = '';
}

function removePhoto(btn, mode, idx) {
  if (mode === 'manual') manualPhotos.splice(idx, 1);
  else { aiPhotos.splice(idx, 1); aiPhotoBase64.splice(idx, 1); }
  btn.parentElement.remove();
}

function handleFiles(input, mode) {
  const files = Array.from(input.files);
  const listEl = document.getElementById(mode + '-file-list');
  files.forEach(file => {
    if (mode === 'manual') manualFiles.push(file);
    else aiFiles.push(file);
    const idx = (mode === 'manual' ? manualFiles : aiFiles).length - 1;
    const icon = file.name.endsWith('.pdf') ? '📕' : file.name.match(/\.docx?$/) ? '📘' : file.name.match(/\.xlsx?$/) ? '📗' : '📎';
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:10px;background:#f5f3ee;border:1px solid #e5e0d8;border-radius:8px;padding:10px 14px;';
    div.innerHTML = `<span style="font-size:22px">${icon}</span><span style="flex:1;font-size:13px;font-weight:500;">${file.name}</span><span style="font-size:11px;color:#6b7280;">${(file.size/1024).toFixed(0)}KB</span><button onclick="removeFile(this,'${mode}',${idx})" style="background:#fdedec;border:1px solid #f5c6cb;color:#dc2626;border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer;">✕</button>`;
    listEl.appendChild(div);
  });
  input.value = '';
}

function removeFile(btn, mode, idx) {
  if (mode === 'manual') manualFiles.splice(idx, 1);
  else aiFiles.splice(idx, 1);
  btn.parentElement.remove();
}

// ===== DRAG & DROP =====
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.attach-area').forEach(area => {
    area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
    area.addEventListener('dragleave', e => { if (!area.contains(e.relatedTarget)) area.classList.remove('drag-over'); });
    area.addEventListener('drop', e => {
      e.preventDefault();
      area.classList.remove('drag-over');
      const mode = area.closest('#panel-manual') ? 'manual' : 'ai';
      const fakeInput = { files: e.dataTransfer.files, value: '' };
      handleAttachments(fakeInput, mode);
    });
  });
});

// ===== ATTACHMENT HANDLING =====
function handleAttachments(input, mode) {
  const files = Array.from(input.files);
  const thumbRow = document.getElementById(mode + '-thumb-row');
  const fileList = document.getElementById(mode + '-file-list');

  files.forEach(async (file) => {
    const isImage = file.type.startsWith('image/');
    if (isImage) {
      // 壓縮圖片並顯示縮圖
      const base64 = await compressImage(file);
      if (mode === 'manual') manualPhotos.push({ file, base64 });
      else { aiPhotos.push({ file, base64 }); aiPhotoBase64.push(base64.split(',')[1]); }
      const idx = (mode === 'manual' ? manualPhotos : aiPhotos).length - 1;
      const div = document.createElement('div');
      div.className = 'attach-thumb';
      div.dataset.mode = mode;
      div.dataset.idx = idx;
      div.dataset.kind = 'photo';
      div.innerHTML = `<img src="${base64}"><button class="del-btn" onclick="removeAttach(this,'${mode}','photo',${idx})">✕</button>`;
      thumbRow.appendChild(div);
    } else {
      // 一般檔案顯示清單
      if (mode === 'manual') manualFiles.push(file);
      else aiFiles.push(file);
      const idx = (mode === 'manual' ? manualFiles : aiFiles).length - 1;
      const icon = file.name.endsWith('.pdf') ? '📕' : file.name.match(/\.docx?$/) ? '📘' : file.name.match(/\.xlsx?$/) ? '📗' : '📎';
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `<span class="fi-icon">${icon}</span><span class="fi-name">${file.name}</span><span class="fi-size">${(file.size/1024).toFixed(0)}KB</span><button class="fi-del" onclick="removeAttach(this,'${mode}','file',${idx})">✕</button>`;
      fileList.appendChild(div);
    }
  });
  input.value = '';
}

function removeAttach(btn, mode, kind, idx) {
  if (kind === 'photo') {
    if (mode === 'manual') manualPhotos.splice(idx, 1);
    else { aiPhotos.splice(idx, 1); aiPhotoBase64.splice(idx, 1); }
  } else {
    if (mode === 'manual') manualFiles.splice(idx, 1);
    else aiFiles.splice(idx, 1);
  }
  btn.parentElement.remove();
}

// ===== EXAMPLE CHIPS =====
function fillExample(text) {
  document.getElementById('ai-text').value = text;
}

// ===== API KEY =====
function showApiModal() {
  const key = localStorage.getItem('claude_api_key') || '';
  document.getElementById('api-key-input').value = key;
  document.getElementById('api-modal').classList.add('show');
}
function hideApiModal() {
  document.getElementById('api-modal').classList.remove('show');
}
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showToast('請輸入 API Key', 'error'); return; }
  localStorage.setItem('claude_api_key', key);
  document.getElementById('api-status').textContent = 'API Key 已設定 ✓';
  hideApiModal();
  showToast('API Key 已儲存 ✓', 'success');
}

// ===== AI ANALYZE =====
async function analyzeWithAI() {
  const text = document.getElementById('ai-text').value.trim();
  const apiKey = localStorage.getItem('claude_api_key');
  
  if (!text && aiPhotos.length === 0) { showToast('請輸入描述或上傳照片', 'error'); return; }
  if (!apiKey) { showApiModal(); return; }

  showLoading('AI 分析中...');
  document.getElementById('ai-result').classList.remove('show');

  try {
    const today = new Date().toISOString().split('T')[0];
    const deptList = '管理、文書、會計、總務、採購、資訊、保全、水電、木工、園藝、暫放、污水';

    const prompt = `你是一個任務管理助理。根據以下描述，幫我整理成結構化的任務資訊。

描述內容：${text || '（請根據圖片判斷）'}
今天日期：${today}
可用部門：${deptList}

請只回傳 JSON 格式，不要有其他文字：
{
  "dept": "對應的部門名稱",
  "name": "簡短的任務名稱（20字內）",
  "desc": "詳細說明",
  "date": "建議截止日期（YYYY-MM-DD格式，若無法判斷則空字串）",
  "assignee": ""
}`;

    let messages;
    if (aiPhotoBase64.length > 0) {
      const content = [
        { type: 'text', text: prompt }
      ];
      aiPhotoBase64.forEach(b64 => {
        content.push({
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: b64 }
        });
      });
      messages = [{ role: 'user', content }];
    } else {
      messages = [{ role: 'user', content: prompt }];
    }

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const resultText = data.content[0].text;
    const jsonMatch = resultText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('解析失敗');

    const result = JSON.parse(jsonMatch[0]);

    document.getElementById('ai-dept').value = result.dept || '';
    document.getElementById('ai-name').value = result.name || '';
    document.getElementById('ai-desc').value = result.desc || '';
    document.getElementById('ai-date').value = result.date || '';
    document.getElementById('ai-assignee').value = result.assignee || '';

    document.getElementById('ai-result').classList.add('show');
    document.getElementById('ai-result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    showToast('AI 分析完成！', 'success');

  } catch(e) {
    console.error('AI分析錯誤:', e);
    showToast('AI 分析失敗：' + (e.message || '請確認API Key是否正確'), 'error');
  } finally {
    hideLoading();
  }
}

// ===== SUBMIT MANUAL =====
async function submitManual() {
  const dept = document.getElementById('manual-dept').value;
  const name = document.getElementById('manual-name').value.trim();
  const desc = document.getElementById('manual-desc').value.trim();
  const date = document.getElementById('manual-date').value;

  if (!dept) { showToast('請選擇單位', 'error'); return; }
  if (!name) { showToast('請輸入任務名稱', 'error'); return; }

  showLoading('建立任務中...');
  try {
    await createGASTask(dept, name, desc, date, manualPhotos, manualFiles);
    showToast('✅ 任務建立成功！', 'success');
    resetManualForm();
  } catch(e) {
    showToast('建立失敗：' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ===== SUBMIT AI =====
async function submitAI() {
  const dept = document.getElementById('ai-dept').value;
  const name = document.getElementById('ai-name').value.trim();
  const desc = document.getElementById('ai-desc').value.trim();
  const date = document.getElementById('ai-date').value;

  if (!dept) { showToast('請選擇單位', 'error'); return; }
  if (!name) { showToast('任務名稱不能空白', 'error'); return; }

  showLoading('建立任務中...');
  try {
    await createGASTask(dept, name, desc, date, aiPhotos, aiFiles);
    showToast('✅ 任務建立成功！', 'success');
    resetAIForm();
  } catch(e) {
    showToast('建立失敗：' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ===== CREATE TASK via Google Sheets =====
async function createGASTask(dept, name, desc, dueDate, photos, files=[]) {
  const data = await gasPost({ action:'createTask', name, listName:dept, status:'待處理', due_date:dueDate||'', assignee:'', description:desc||'' });
  if (!data.success) throw new Error(data.error || '建立任務失敗');
  const taskId = data.id;
  const attachments = [];
  for (const p of photos) {
    const base64 = p.base64.split(',')[1];
    const up = await gasPost({ action:'uploadFile', taskId, fileName:p.file.name, fileBase64:base64, mimeType:p.file.type||'image/jpeg' });
    if (up.success) attachments.push({ id:up.fileId, title:p.file.name, url:up.fileUrl });
  }
  for (const f of files) {
    const base64 = await fileToBase64(f);
    const up = await gasPost({ action:'uploadFile', taskId, fileName:f.name, fileBase64:base64, mimeType:f.type||'application/octet-stream' });
    if (up.success) attachments.push({ id:up.fileId, title:f.name, url:up.fileUrl });
  }
  if (attachments.length > 0) {
    await gasPost({ action:'updateTask', id:taskId, attachments:JSON.stringify(attachments) });
  }
  return data;
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== RESET FORMS =====
function resetManualForm() {
  selectedDept = '';
  document.getElementById('manual-dept').value = '';
  document.getElementById('manual-name').value = '';
  document.getElementById('manual-desc').value = '';
  document.getElementById('manual-date').value = '';
  document.getElementById('manual-assignee').value = '';
  document.getElementById('manual-thumb-row').innerHTML = '';
  document.getElementById('manual-file-list').innerHTML = '';
  manualPhotos = []; manualFiles = [];
  document.querySelectorAll('#panel-manual .dept-btn').forEach(b => b.classList.remove('selected'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAIForm() {
  document.getElementById('ai-text').value = '';
  document.getElementById('ai-thumb-row').innerHTML = '';
  document.getElementById('ai-file-list').innerHTML = '';
  document.getElementById('ai-result').classList.remove('show');
  aiPhotos = []; aiPhotoBase64 = []; aiFiles = [];
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== UI HELPERS =====
function showLoading(text) {
  document.getElementById('loading-text').textContent = text || '處理中...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
